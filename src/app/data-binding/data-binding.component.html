<h3>User profile Component</h3>
<h5>Welcome {{registerDetails.value.name}}!</h5>
<form [formGroup]="registerDetails">
    <span>Enter Name: </span>
        <input  formControlName="name" placeholder="Input Name"/>
    <br>
    <span>Enter Email: </span>
        <input formControlName="email" placeholder="Enter email">
    <br>
    <span>Enter Date of birth: </span>
        <input formControlName="dob" placeholder="Input DOB"/>
        <br>
    <button (click)="onSubmit()" [disabled]="!(registerDetails.value.name && registerDetails.value.email && registerDetails.value.dob)">Submit</button>
    <button (click)="onClear()">Reset</button>
</form>
<div id="profileDisplay" style="margin-top:50px">
    <p>Name: {{registerDetails.value.name}}</p>
    <p>Email: {{registerDetails.value.email}}</p>
    <p>DOB: {{registerDetails.value.dob}}</p>
    <p>Saved button clicked: {{count}}</p>
</div>
